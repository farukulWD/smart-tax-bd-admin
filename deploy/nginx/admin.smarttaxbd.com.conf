# Nginx server block — Smart Tax BD Admin
# Proxies admin.smarttaxbd.com -> the admin container (host-bound 127.0.0.1:3001)
#
# Install on the server:
#   sudo cp admin.smarttaxbd.com.conf /etc/nginx/sites-available/admin.smarttaxbd.com
#   sudo ln -s /etc/nginx/sites-available/admin.smarttaxbd.com /etc/nginx/sites-enabled/
#   sudo nginx -t && sudo systemctl reload nginx
# Then issue TLS cert (rewrites this file to add :443 + redirect):
#   sudo certbot --nginx -d admin.smarttaxbd.com

server {
    listen 80;
    listen [::]:80;
    server_name admin.smarttaxbd.com;

    # Next.js app (PORT=3001 on loopback, set in the deploy workflow)
    location / {
        proxy_pass http://127.0.0.1:3001;
        proxy_http_version 1.1;

        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # websockets / HMR-style upgrades
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection "upgrade";

        proxy_read_timeout 60s;
    }
}
